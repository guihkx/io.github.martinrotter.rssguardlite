id: io.github.martinrotter.rssguardlite
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang # To build rssguard-article-extractor
command: rssguard

finish-args:
  - --device=dri
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=wayland
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: clang-format
    buildsystem: cmake-ninja
    subdir: llvm
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=MinSizeRel
      - -DBUILD_SHARED_LIBS=OFF
      - -DLLVM_ENABLE_PROJECTS=clang
    make-args:
      - clang-format
    no-make-install: true
    build-commands:
      - install -Dt /app/bin bin/clang-format
    sources:
      - type: archive
        url: https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.4/llvm-project-22.1.4.src.tar.xz
        sha256: 3e68c90dda630c27d41d201e37b8bbf5222e39b273dec5ca880709c69e0a07d4
        x-checker-data:
          type: anitya
          project-id: 1830
          stable-only: true
          url-template: https://github.com/llvm/llvm-project/releases/download/llvmorg-$version/llvm-project-$version.src.tar.xz

  - name: qxmpp
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_TESTING=OFF
      - -DBUILD_EXAMPLES=OFF
    sources:
      - type: archive
        url: https://download.kde.org/unstable/qxmpp/qxmpp-1.15.1.tar.xz
        sha256: 0747758a4f5b5ea4c60686c65b390766f1909d09e1a5a457c8e80ef272730c46
        x-checker-data:
          type: anitya
          project-id: 4149
          stable-only: true
          url-template: https://download.kde.org/unstable/qxmpp/qxmpp-$version.tar.xz
    cleanup:
      - /include
      - /lib/cmake
      - /lib/pkgconfig

  - name: rssguard
    buildsystem: cmake-ninja
    build-options:
      append-path: /usr/lib/sdk/golang/bin
      env:
        GOROOT: /usr/lib/sdk/golang
    config-opts:
      - -DIS_DEV_BUILD=OFF
      - -DREVISION_FROM_GIT=OFF
      - -DNO_UPDATE_CHECK=ON
      - -DIS_FLATPAK_BUILD=ON
      - -DBUILD_XMPP_PLUGIN=ON
      - -DWEB_ARTICLE_VIEWER_WEBENGINE=OFF
      - -DENABLE_MEDIAPLAYER_LIBMPV=OFF
    sources:
      - type: archive
        url: https://github.com/martinrotter/rssguard/releases/download/devbuild5/rssguard-dev-fbeeb8e6d-src.tar.gz
        sha256: 2058f63e4cb6c3ae73d0ecbdbf9722bbc01efdf057cb6d430ea0bb44db8fb90d
        x-checker-data:
          type: anitya
          project-id: 19046
          stable-only: true
          url-template: https://github.com/martinrotter/rssguard/releases/download/$version/rssguard-$version-src.tar.gz
    cleanup:
      - /include
